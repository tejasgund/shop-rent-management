version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: shop_rent_mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: shop_rent_db
      MYSQL_USER: shoprent_user
      MYSQL_PASSWORD: shoprent_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - shop_rent_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build: ./backend
    container_name: shop_rent_backend
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: shop_rent_db
      MYSQL_USER: shoprent_user
      MYSQL_PASSWORD: shoprent_password
      SECRET_KEY: your-secret-key-change-in-production
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - backend_logs:/app/logs
    networks:
      - shop_rent_network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    container_name: shop_rent_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - shop_rent_network
    environment:
      REACT_APP_API_URL: http://localhost:8000

networks:
  shop_rent_network:
    driver: bridge

volumes:
  mysql_data:
  backend_logs: